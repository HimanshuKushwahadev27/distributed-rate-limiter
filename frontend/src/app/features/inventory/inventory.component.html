<mat-card class="form-card">
  <mat-card-title>Add Inventory</mat-card-title>

  <form [formGroup]="inventoryForm" (ngSubmit)="onSubmit()">

    <!-- SKU Code -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>SKU Code</mat-label>
      <input matInput formControlName="skuCode" placeholder="Enter SKU Code" />

      @if (inventoryForm.get('skuCode')?.touched && inventoryForm.get('skuCode')?.invalid) {
        <mat-error>SKU Code is required</mat-error>
      }
    </mat-form-field>

    <!-- Quantity -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" placeholder="Enter quantity" />

      @if (inventoryForm.get('quantity')?.touched && inventoryForm.get('quantity')?.invalid) {
        <mat-error>Enter a valid quantity</mat-error>
      }
    </mat-form-field>

    <!-- Submit Button -->
    <div class="btn-container">
      <button mat-raised-button color="primary" type="submit" [disabled]="inventoryForm.invalid">
        Submit
      </button>
    </div>

  </form>
</mat-card>
